name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  JAVA_VERSION: "17"
  MAVEN_ARGS: "--batch-mode --no-transfer-progress"

jobs:
  build-test-package:
    name: Test, Package and Build Docker Images
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Run unit tests
        run: mvn $MAVEN_ARGS test

      - name: Package Spring Boot jars
        run: mvn $MAVEN_ARGS package -DskipTests

      - name: Build Docker images
        run: >
          docker compose build
          discovery-server
          config-server
          api-gateway
          identity-service
          workshop-service
          reservation-service
          booking-service
          payment-service
          notification-service

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: build-test-package
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Run integration tests
        run: mvn $MAVEN_ARGS verify -Pintegration-tests

  deploy-dev:
    name: Deploy Development Docker Compose Stack
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs:
      - build-test-package
      - integration-tests
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
    environment: development

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Package Spring Boot jars
        run: mvn $MAVEN_ARGS package -DskipTests

      - name: Deploy with Docker Compose
        run: docker compose up -d --build

      - name: Show Compose status
        run: docker compose ps
