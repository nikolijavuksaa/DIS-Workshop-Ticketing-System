global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: discovery-server
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["discovery-server:8761"]

  - job_name: config-server
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["config-server:8888"]

  - job_name: api-gateway
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["api-gateway:8080"]

  - job_name: identity-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["identity-service:8100"]

  - job_name: workshop-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["workshop-service:8200"]

  - job_name: reservation-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["reservation-service:8300"]

  - job_name: booking-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["booking-service:8400"]

  - job_name: payment-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["payment-service:8500"]

  - job_name: notification-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["notification-service:8600"]
