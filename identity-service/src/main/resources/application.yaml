spring:
  application:
    name: identity-service
  config:
    import: optional:configserver:http://localhost:8888
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:local-google-client-id}
            client-secret: ${GOOGLE_CLIENT_SECRET:local-google-client-secret}
            scope: openid,email,profile
          github:
            client-id: ${GITHUB_CLIENT_ID:local-github-client-id}
            client-secret: ${GITHUB_CLIENT_SECRET:local-github-client-secret}
            scope: read:user,user:email

app:
  security:
    jwt:
      secret: ${JWT_SECRET:change-me-change-me-change-me-change-me}
      issuer: ${JWT_ISSUER:workshop-ticketing-system}
      expiration-minutes: ${JWT_EXPIRATION_MINUTES:60}
    oauth2:
      success-redirect-url: ${OAUTH2_SUCCESS_REDIRECT_URL:http://localhost:3000/oauth2/success}
